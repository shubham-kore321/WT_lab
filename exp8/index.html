<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHP Experiment</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: #fff7ed;
    color: #333;
}

.header {
    text-align: center;
    padding: 40px 20px;
    background: #fb923c;
    color: white;
}

.header h1 {
    margin: 0;
}

.timeline {
    position: relative;
    max-width: 900px;
    margin: 40px auto;
}


.timeline::after {
    content: '';
    position: absolute;
    width: 4px;
    background: #fb923c;
    top: 0;
    bottom: 0;
    left: 50%;
    margin-left: -2px;
}

.container {
    padding: 20px 40px;
    position: relative;
    width: 50%;
}

.left {
    left: 0;
}

.right {
    left: 50%;
}

.content {
    background: white;
    padding: 20px;
    border-radius: 12px;
    border: 2px solid #fed7aa;
}

.container::before {
    content: attr(data-step);
    position: absolute;
    width: 40px;
    height: 40px;
    background: #fb923c;
    color: white;
    border-radius: 50%;
    top: 20px;
    right: -20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
}

.right::before {
    left: -20px;
}

img {
    width: 100%;
    border-radius: 8px;
    margin-top: 10px;
}


.section {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.section h2 {
    color: #ea580c;
}


.conclusion {
    background: #dcfce7;
    padding: 20px;
    border-left: 5px solid #16a34a;
}


@media screen and (max-width: 768px) {

    .timeline::after {
        left: 20px;
    }

    .container {
        width: 100%;
        padding-left: 60px;
        padding-right: 20px;
    }

    .container::before {
        left: 10px;
    }

    .right {
        left: 0;
    }
}
</style>
</head>

<body>

<div class="header">
    <h1>Introduction to PHP</h1>
    <p>Experiment 8</p>
</div>

<div class="section">
    <h2>Objective</h2>
    <p>To install PHP using XAMPP and understand basic PHP concepts.</p>
</div>

<div class="timeline">

    <div class="container left" data-step="1">
        <div class="content">
            <h3>Install XAMPP</h3>
            <img src="s1.jpg">
        </div>
    </div>

    <div class="container right" data-step="2">
        <div class="content">
            <h3>Start Apache & MySQL</h3>
            <img src="s2.jpg">
        </div>
    </div>

    <div class="container left" data-step="3">
        <div class="content">
            <h3>Create PHP File</h3>
            <img src="s3.png">
        </div>
    </div>

    <div class="container right" data-step="4">
        <div class="content">
            <h3>Write PHP Code</h3>
            <img src="s4.jpg">
        </div>
    </div>

    <div class="container left" data-step="5">
        <div class="content">
            <h3>Run in Browser</h3>
            <img src="s6.jpg">
        </div>
    </div>

</div>

<div class="section">
    <h2>Conclusion</h2>
    <div class="conclusion">
        Successfully installed XAMPP and executed PHP program.
    </div>
</div>

</body>
</html>
